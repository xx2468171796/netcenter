<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · 服务器监控</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="login-body">
  <form class="login-card" method="POST" action="/login">
    <h1>服务器监控</h1>
    <p class="login-sub">请登录后查看</p>
    <label>用户名<input name="username" autocomplete="username" required autofocus /></label>
    <label>密码<input name="password" type="password" autocomplete="current-password" required /></label>
    <button type="submit">登 录</button>
    <div class="login-err" id="err">用户名或密码错误</div>
  </form>
  <script>
    if (new URLSearchParams(location.search).get("e")) document.getElementById("err").style.display = "block";
  </script>
</body>
</html>
